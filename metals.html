<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metals Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --silver: #8C9BAA;
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --text: #1A1917;
    --muted: #7A7872;
    --dim: #AEACA5;
    --up: #3B6D11;
    --up-bg: #EAF3DE;
    --down: #8B2B0F;
    --down-bg: #FAECE7;
    --border: rgba(0,0,0,0.08);
    --radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --gold: #E8C46A;
      --silver: #A8B8C8;
      --bg: #111110;
      --surface: #1C1C1A;
      --text: #F0EDE8;
      --muted: #9E9B94;
      --dim: #5A5852;
      --up: #97C459;
      --up-bg: #173404;
      --down: #F09575;
      --down-bg: #3A1508;
      --border: rgba(255,255,255,0.07);
    }
  }

  html, body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 0.75rem;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .header-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .header-time {
    font-size: 10px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 0.75rem 0.75rem 0.65rem;
    border: 0.5px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card.gold .card-accent   { background: var(--gold); }
  .card.silver .card-accent { background: var(--silver); }

  .card-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .card.gold .dot   { background: var(--gold); }
  .card.silver .dot { background: var(--silver); }

  .card-name {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .price {
    font-size: clamp(13px, 3.5vw, 18px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 20px;
  }

  .price.loading {
    background: var(--border);
    color: transparent;
    border-radius: 3px;
    animation: pulse 1.5s ease infinite;
    width: 80%;
  }

  .badge {
    display: block;
    font-size: clamp(9px, 2.2vw, 11px);
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 20px;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge.up      { background: var(--up-bg);   color: var(--up); }
  .badge.down    { background: var(--down-bg); color: var(--down); }
  .badge.neutral { background: var(--border);  color: var(--dim); }

  .unit {
    display: block;
    font-size: 9px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 5px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-note {
    font-size: 9px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    margin-right: 8px;
  }

  .refresh-btn {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--muted);
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 8px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
    transition: background 0.1s;
    letter-spacing: 0.03em;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text); }

  .spin { display: inline-block; }
  .spin.active { animation: spin 0.8s linear infinite; }

  @keyframes spin  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
</style>
</head>
<body>
  <div class="header">
    <span class="header-title">Edelmetalen</span>
    <span class="header-time" id="hdr-time">—</span>
  </div>

  <div class="cards">
    <div class="card gold">
      <div class="card-accent"></div>
      <div class="card-meta"><div class="dot"></div><span class="card-name">Goud</span></div>
      <div class="price loading" id="gold-price">&nbsp;</div>
      <div class="badge neutral" id="gold-change">laden...</div>
      <span class="unit">per kg · EUR</span>
    </div>
    <div class="card silver">
      <div class="card-accent"></div>
      <div class="card-meta"><div class="dot"></div><span class="card-name">Zilver</span></div>
      <div class="price loading" id="silver-price">&nbsp;</div>
      <div class="badge neutral" id="silver-change">laden...</div>
      <span class="unit">per kg · EUR</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note" id="footer-note">Laden...</span>
    <button class="refresh-btn" onclick="loadPrices()">
      <span class="spin" id="spin-icon">↻</span> ververs
    </button>
  </div>

<script>
function eur(val) {
  return new Intl.NumberFormat('nl-BE', {
    style: 'currency', currency: 'EUR',
    minimumFractionDigits: 0, maximumFractionDigits: 0
  }).format(val);
}

function setCard(priceEl, badgeEl, metal) {
  priceEl.textContent = eur(metal.priceKgEur);
  priceEl.classList.remove('loading');

  const ch  = metal.changeKgEur;
  const chp = metal.changePct;
  if (ch !== 0) {
    const sign  = ch >= 0 ? '+' : '';
    const arrow = ch >= 0 ? '↑' : '↓';
    badgeEl.className = 'badge ' + (ch > 0 ? 'up' : 'down');
    badgeEl.textContent = arrow + ' ' + sign + eur(ch) + ' (' + sign + chp.toFixed(2) + '%)';
  } else {
    badgeEl.className = 'badge neutral';
    badgeEl.textContent = '— geen data';
  }
}

async function loadPrices() {
  const spin = document.getElementById('spin-icon');
  spin.classList.add('active');
  try {
    const res = await fetch('./prices.json?t=' + Date.now());
    if (!res.ok) throw new Error('prices.json niet gevonden');
    const data = await res.json();
    if (!data.gold || !data.gold.priceKgEur) throw new Error('Wacht op eerste Actions run');

    setCard(document.getElementById('gold-price'),   document.getElementById('gold-change'),   data.gold);
    setCard(document.getElementById('silver-price'), document.getElementById('silver-change'), data.silver);

    document.getElementById('hdr-time').textContent  = new Date().toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('footer-note').textContent = 'Bijgewerkt ' + data.updated;
  } catch (e) {
    document.getElementById('footer-note').textContent = 'Fout: ' + e.message;
    ['gold-price','silver-price'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '—'; el.classList.remove('loading');
    });
    ['gold-change','silver-change'].forEach(id => {
      document.getElementById(id).className = 'badge neutral';
      document.getElementById(id).textContent = 'niet beschikbaar';
    });
  } finally {
    spin.classList.remove('active');
  }
}

loadPrices();
setInterval(loadPrices, 5 * 60 * 1000);
</script>
</body>
</html>
