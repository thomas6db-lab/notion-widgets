name: Update metal prices

on:
  schedule:
    - cron: '0 * * * *'   # elk uur
  workflow_dispatch:       # ook manueel te starten

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch & compute prices
        run: |
          python3 - <<'EOF'
          import urllib.request, json

          TROY_TO_KG = 32.1507

          with urllib.request.urlopen('https://data-asg.goldprice.org/dbXRates/USD') as r:
              gp = json.loads(r.read())

          with urllib.request.urlopen('https://open.er-api.com/v6/latest/USD') as r:
              fx = json.loads(r.read())

          eur     = fx['rates']['EUR']
          item    = next(i for i in gp['items'] if i['curr'] == 'USD')
          gold_oz  = item['xauPrice']
          silv_oz  = item['xagPrice']
          gold_ch  = item.get('chgXau', 0) or 0
          silv_ch  = item.get('chgXag', 0) or 0

          def pct(price, ch):
              prev = price - ch
              return round((ch / prev) * 100, 2) if prev else 0

          data = {
              'updated':  gp.get('date', ''),
              'eurRate':  round(eur, 6),
              'gold': {
                  'priceKgEur':  round(gold_oz * TROY_TO_KG * eur),
                  'changeKgEur': round(gold_ch * TROY_TO_KG * eur),
                  'changePct':   pct(gold_oz, gold_ch)
              },
              'silver': {
                  'priceKgEur':  round(silv_oz * TROY_TO_KG * eur),
                  'changeKgEur': round(silv_ch * TROY_TO_KG * eur),
                  'changePct':   pct(silv_oz, silv_ch)
              }
          }

          with open('prices.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          EOF

      - name: Commit prices.json
        run: |
          git config user.name  "prices-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update metal prices"
          git push
