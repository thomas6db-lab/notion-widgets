<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dagplanning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --text: #1A1917;
    --muted: #7A7872;
    --dim: #AEACA5;
    --border: rgba(0,0,0,0.08);
    --radius: 10px;
    --today-bg: #FBF5E6;
    --today-border: #E8D199;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1C1C1A;
      --text: #F0EDE8;
      --muted: #9E9B94;
      --dim: #5A5852;
      --border: rgba(255,255,255,0.07);
      --today-bg: #2A2317;
      --today-border: #5A4820;
    }
  }

  html, body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 0.75rem; }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }
  .topbar-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .topbar-time {
    font-size: 10px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
  }
  .refresh-btn {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 7px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text); }
  .spin { display: inline-block; }
  .spin.active { animation: spin 0.8s linear infinite; }

  /* ── Section ── */
  .section { margin-bottom: 0.75rem; }
  .section:last-child { margin-bottom: 0; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .section-badge {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    padding: 1px 6px;
    border-radius: 20px;
  }
  .badge-today    { background: #E8C46A; color: #2A2317; }
  .badge-tomorrow { background: var(--border); color: var(--muted); }
  .section-date {
    font-size: 9px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Events ── */
  .events { display: flex; flex-direction: column; gap: 5px; }

  .event {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 0.5rem 0.65rem 0.45rem;
    display: flex;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .event.today-ev   { background: var(--today-bg); border-color: var(--today-border); }
  .event.tomorrow-ev { opacity: 0.75; }

  /* Past = grijs */
  .event.past {
    opacity: 0.35;
    filter: grayscale(0.7);
  }

  .event-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2.5px;
  }
  .event-inner { padding-left: 10px; flex: 1; min-width: 0; }

  .event-time {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .event-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
    flex-wrap: wrap;
  }
  .event-loc {
    font-size: 10px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .event-cal {
    font-size: 9px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    opacity: 0.7;
  }

  .allday-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-style: italic;
  }
  .allday-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .empty {
    font-size: 10px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    font-style: italic;
    padding: 0.25rem 0.1rem;
  }
  .divider { height: 0.5px; background: var(--border); margin: 0.75rem 0; }
  .next-label {
    font-size: 9px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    font-style: italic;
    margin-bottom: 4px;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Planning</span>
  <div class="topbar-right">
    <span class="topbar-time" id="hdr-time">—</span>
    <button class="refresh-btn" onclick="loadEvents()">
      <span class="spin" id="spin-icon">↻</span>
    </button>
  </div>
</div>

<div id="root"></div>

<script>
const TZ = 'Europe/Brussels';

const KEYWORD_COLORS = [
  { re: /les|ugent|college|examen|tentamen|vak|hoorcollege|werkcollege/i, bar: '#378ADD' },
  { re: /tectonic|meeting|call|vergadering|pitch|overleg/i,               bar: '#534AB7' },
  { re: /thesis|schrijv|onderzoek|paper|masterproef/i,                    bar: '#D85A30' },
  { re: /sport|gym|loop|zwem|fitness|training/i,                          bar: '#3B6D11' },
  { re: /eten|lunch|dinner|resto|café|date|verjaardag|birthday/i,         bar: '#D4537E' },
  { re: /feestdag|vrij|vakantie/i,                                         bar: '#C9A84C' },
];

function getBar(e) {
  if (e.calendar === 'feestdagen')    return '#3B6D11';
  if (e.calendar === 'verjaardagen')  return '#D4537E';
  if (e.calendar === 'tectonic')      return '#D85A30';
  if (e.calendar === 'timeedit')      return '#534AB7';
  if (e.calendar === 'ufora')         return '#C9A84C';
  for (const c of KEYWORD_COLORS) {
    if (c.re.test(e.summary || '')) return c.bar;
  }
  return '#888780';
}

function fmtTime(dtStr) {
  if (!dtStr) return null;
  try {
    return new Date(dtStr).toLocaleTimeString('nl-BE', {
      hour: '2-digit', minute: '2-digit', timeZone: TZ
    });
  } catch { return null; }
}

function isPast(e) {
  if (e.allDay) return false;
  try { return new Date(e.end) < new Date(); }
  catch { return false; }
}

function calLabel(cal) {
  const map = {
    thomas6db: 'persoonlijk', timeedit: 'TimeEdit',
    tectonic: 'Tectonic', feestdagen: 'feestdag',
    ufora: 'Ufora', verjaardagen: 'verjaardag'
  };
  return map[cal] || '';
}

function renderEvent(e, baseClass) {
  const bar      = getBar(e);
  const past     = isPast(e);
  const classes  = ['event', baseClass, past ? 'past' : ''].filter(Boolean).join(' ');
  const startFmt = fmtTime(e.start);
  const endFmt   = fmtTime(e.end);
  const timeStr  = startFmt
    ? (endFmt && endFmt !== startFmt ? startFmt + ' – ' + endFmt : startFmt)
    : null;
  const loc = e.location ? e.location.split(',')[0] : '';
  const cal = calLabel(e.calendar);

  if (e.allDay) {
    return `<div class="allday-pill">
      <span class="allday-dot" style="background:${bar}"></span>
      ${e.summary || ''}
    </div>`;
  }

  return `<div class="${classes}">
    <div class="event-bar" style="background:${bar}"></div>
    <div class="event-inner">
      ${timeStr ? `<div class="event-time">${timeStr}</div>` : ''}
      <div class="event-title">${e.summary || '(geen titel)'}</div>
      <div class="event-meta">
        ${loc ? `<span class="event-loc">📍 ${loc}</span>` : ''}
        ${cal ? `<span class="event-cal">${cal}</span>`    : ''}
      </div>
    </div>
  </div>`;
}

function render(data) {
  const today        = data.today         || [];
  const tmrw         = data.firstTomorrow || [];
  const todayLabel   = data.todayLabel    || 'vandaag';
  const tomorrowLabel= data.tomorrowLabel || 'morgen';

  let html = '';

  // Today
  html += `<div class="section">
    <div class="section-header">
      <span class="section-badge badge-today">Vandaag</span>
      <span class="section-date">${todayLabel}</span>
    </div>
    <div class="events">`;

  if (today.length === 0) {
    html += '<div class="empty">Niets gepland vandaag</div>';
  } else {
    today.forEach(e => { html += renderEvent(e, 'today-ev'); });
  }
  html += '</div></div><div class="divider"></div>';

  // Tomorrow (first only)
  html += `<div class="section">
    <div class="section-header">
      <span class="section-badge badge-tomorrow">Morgen</span>
      <span class="section-date">${tomorrowLabel}</span>
    </div>`;

  if (tmrw.length === 0) {
    html += '<div class="events"><div class="empty">Niets gepland morgen</div></div>';
  } else {
    html += '<div class="next-label">Eerste activiteit</div><div class="events">';
    html += renderEvent(tmrw[0], 'tomorrow-ev');
    html += '</div>';
  }
  html += '</div>';

  document.getElementById('root').innerHTML = html;
  document.getElementById('hdr-time').textContent =
    data.updated ? 'bijgewerkt ' + data.updated : '—';
}

async function loadEvents() {
  const spin = document.getElementById('spin-icon');
  spin.classList.add('active');
  try {
    const res = await fetch('./events.json?t=' + Date.now());
    if (!res.ok) throw new Error('events.json niet gevonden');
    render(await res.json());
  } catch (e) {
    document.getElementById('root').innerHTML =
      `<div class="empty">Fout: ${e.message}</div>`;
  } finally {
    spin.classList.remove('active');
  }
}

// Laad bij start, en herrender elke minuut zodat events automatisch grijs worden
loadEvents();
setInterval(() => {
  fetch('./events.json?t=' + Date.now())
    .then(r => r.json())
    .then(render)
    .catch(() => {});
}, 60 * 1000);
</script>
</body>
</html>
