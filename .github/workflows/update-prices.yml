name: Update metal prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch & compute prices
        run: |
          python3 - <<'EOF'
          import urllib.request, json, csv, datetime
          from io import StringIO

          TROY_TO_KG = 32.1507

          headers = {'User-Agent': 'Mozilla/5.0'}

          def fetch_stooq(symbol):
              # stooq.com returns a CSV: Date,Open,High,Low,Close,Volume
              # last row = most recent trading day
              url = f'https://stooq.com/q/d/l/?s={symbol}&i=d'
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as r:
                  text = r.read().decode('utf-8')
              rows = list(csv.DictReader(StringIO(text)))
              # take last two rows for today + yesterday
              today = rows[-1]
              prev  = rows[-2] if len(rows) >= 2 else rows[-1]
              return float(today['Close']), float(prev['Close'])

          # XAU/USD and XAG/USD spot prices in USD per troy ounce
          gold_now,   gold_prev   = fetch_stooq('xauusd')
          silver_now, silver_prev = fetch_stooq('xagusd')

          # EUR/USD via frankfurter.app
          req = urllib.request.Request(
              'https://api.frankfurter.app/latest?from=USD&to=EUR',
              headers=headers
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              eur = json.loads(r.read())['rates']['EUR']

          def build(now, prev):
              ch  = now - prev
              pct = (ch / prev) * 100 if prev else 0
              return {
                  'priceKgEur':  round(now * TROY_TO_KG * eur),
                  'changeKgEur': round(ch  * TROY_TO_KG * eur),
                  'changePct':   round(pct, 2)
              }

          data = {
              'updated': datetime.datetime.utcnow().strftime('%d/%m %H:%M') + ' UTC',
              'eurRate': round(eur, 6),
              'gold':   build(gold_now,   gold_prev),
              'silver': build(silver_now, silver_prev)
          }

          with open('prices.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          EOF

      - name: Commit prices.json
        run: |
          git config user.name  "prices-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update metal prices"
          git push
