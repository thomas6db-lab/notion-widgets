name: Update metal prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch & compute prices
        run: |
          python3 - <<'EOF'
          import urllib.request, json, datetime

          TROY_TO_KG = 32.1507

          headers = {
              'User-Agent': 'Mozilla/5.0 (compatible; price-bot/1.0)',
              'Accept': 'application/json'
          }

          # Yahoo Finance: GC=F = Gold futures, SI=F = Silver futures
          url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=GC%3DF%2CSI%3DF&fields=regularMarketPrice,regularMarketPreviousClose,currency'

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req, timeout=15) as r:
              yf = json.loads(r.read())

          results = yf['quoteResponse']['result']
          gold   = next(q for q in results if q['symbol'] == 'GC=F')
          silver = next(q for q in results if q['symbol'] == 'SI=F')

          # Yahoo quotes are in USD per troy ounce
          # FX: EUR/USD via frankfurter.app (free, no auth needed)
          req2 = urllib.request.Request(
              'https://api.frankfurter.app/latest?from=USD&to=EUR',
              headers=headers
          )
          with urllib.request.urlopen(req2, timeout=15) as r:
              fx = json.loads(r.read())

          eur = fx['rates']['EUR']

          def build(q):
              price = q['regularMarketPrice']
              prev  = q['regularMarketPreviousClose']
              ch    = price - prev
              pct   = (ch / prev) * 100 if prev else 0
              return {
                  'priceKgEur':  round(price * TROY_TO_KG * eur),
                  'changeKgEur': round(ch    * TROY_TO_KG * eur),
                  'changePct':   round(pct, 2)
              }

          data = {
              'updated': datetime.datetime.utcnow().strftime('%d/%m %H:%M') + ' UTC',
              'eurRate': round(eur, 6),
              'gold':   build(gold),
              'silver': build(silver)
          }

          with open('prices.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          EOF

      - name: Commit prices.json
        run: |
          git config user.name  "prices-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update metal prices"
          git push
