name: Update prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch & compute prices
        run: |
          python3 - <<'EOF'
          import urllib.request, json, csv, datetime
          from io import StringIO

          TROY_TO_KG = 32.1507
          HEADERS = {'User-Agent': 'Mozilla/5.0'}

          # ── EUR/USD ──────────────────────────────────────────────────
          req = urllib.request.Request('https://api.frankfurter.app/latest?from=USD&to=EUR', headers=HEADERS)
          with urllib.request.urlopen(req, timeout=15) as r:
              eur = json.loads(r.read())['rates']['EUR']

          # ── Stooq helper ─────────────────────────────────────────────
          def fetch_stooq(symbol):
              try:
                  url = f'https://stooq.com/q/d/l/?s={symbol}&i=d'
                  req = urllib.request.Request(url, headers=HEADERS)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      text = r.read().decode('utf-8')
                  rows = list(csv.DictReader(StringIO(text)))
                  if len(rows) < 2:
                      print(f'  WARN {symbol}: minder dan 2 rijen')
                      return None
                  return float(rows[-1]['Close']), float(rows[-2]['Close'])
              except Exception as e:
                  print(f'  WARN stooq {symbol}: {e}')
                  return None

          def build_usd(symbol, decimals=2):
              r = fetch_stooq(symbol)
              if not r: return None
              now, prev = r
              ch  = now - prev
              pct = round((ch / prev) * 100, 2) if prev else 0
              return {
                  'priceEur':  round(now * eur, decimals),
                  'changeEur': round(ch  * eur, decimals),
                  'changePct': pct
              }

          def build_eur(symbol, decimals=2):
              r = fetch_stooq(symbol)
              if not r: return None
              now, prev = r
              ch  = now - prev
              pct = round((ch / prev) * 100, 2) if prev else 0
              return {
                  'priceEur':  round(now, decimals),
                  'changeEur': round(ch,  decimals),
                  'changePct': pct
              }

          # ── CoinGecko (crypto) ────────────────────────────────────────
          def fetch_coingecko(ids):
              id_str = ','.join(ids)
              url = (f'https://api.coingecko.com/api/v3/simple/price'
                     f'?ids={id_str}&vs_currencies=eur&include_24hr_change=true')
              req = urllib.request.Request(url, headers={**HEADERS, 'Accept': 'application/json'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
              result = {}
              for cid in ids:
                  d     = data.get(cid, {})
                  price = d.get('eur', 0)
                  chp   = d.get('eur_24h_change', 0) or 0
                  prev  = price / (1 + chp / 100) if chp != -100 else price
                  ch    = price - prev
                  # Use 4 decimals for small-value coins like ADA
                  dec = 4 if price < 10 else 2
                  result[cid] = {
                      'priceEur':  round(price, dec),
                      'changeEur': round(ch,    dec),
                      'changePct': round(chp,   2)
                  }
              return result

          # ── Fetch all ─────────────────────────────────────────────────
          assets = {}

          # Edelmetalen (USD/troy oz → EUR/kg)
          r = fetch_stooq('xauusd')
          if r:
              now, prev = r
              ch = (now - prev) * TROY_TO_KG * eur
              assets['gold'] = {
                  'priceEur':  round(now * TROY_TO_KG * eur),
                  'changeEur': round(ch),
                  'changePct': round(((now - prev) / prev) * 100, 2)
              }

          r = fetch_stooq('xagusd')
          if r:
              now, prev = r
              ch = (now - prev) * TROY_TO_KG * eur
              assets['silver'] = {
                  'priceEur':  round(now * TROY_TO_KG * eur),
                  'changeEur': round(ch),
                  'changePct': round(((now - prev) / prev) * 100, 2)
              }

          # Crypto via CoinGecko
          try:
              crypto = fetch_coingecko(['bitcoin', 'cardano'])
              assets['btc'] = crypto['bitcoin']
              assets['ada'] = crypto['cardano']
          except Exception as e:
              print(f'  WARN CoinGecko: {e}')
              assets['btc'] = None
              assets['ada'] = None

          # Aandelen & ETFs
          assets['googl'] = build_usd('googl.us')

          # EUNL  → iShares Core MSCI World (Xetra, EUR)
          assets['eunl']  = build_eur('eunl.de')

          # EUNK  → iShares Core MSCI Europe (Xetra, EUR)  ← gecorrigeerd
          assets['msci_europe'] = build_eur('eunk.de')

          # EMIM  → iShares Core MSCI EM IMI (Euronext Amsterdam, EUR)  ← gecorrigeerd
          assets['em'] = build_eur('emim.nl')

          data = {
              'updated': datetime.datetime.utcnow().strftime('%d/%m %H:%M') + ' UTC',
              'eurRate': round(eur, 6),
              'assets':  assets
          }

          with open('prices.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          EOF

      - name: Commit prices.json
        run: |
          git config user.name  "prices-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices"
          git push
